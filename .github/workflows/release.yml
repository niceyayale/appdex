name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '35'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/appdex-${{ steps.version.outputs.VERSION_NAME }}-debug.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/appdex-${{ steps.version.outputs.VERSION_NAME }}-release-unsigned.apk || true
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/appdex-${{ steps.version.outputs.VERSION_NAME }}-release.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_NAME }}
          name: APPDEX ${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## APPDEX ${{ steps.version.outputs.VERSION_NAME }}

            ### Download

            - **Debug APK**: For testing, includes debug logging
            - **Release APK**: Production build (unsigned, needs manual signing)

            ### Install

            1. Download the APK file below
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK file to install
          files: |
            app/build/outputs/apk/debug/appdex-${{ steps.version.outputs.VERSION_NAME }}-debug.apk
            app/build/outputs/apk/release/appdex-${{ steps.version.outputs.VERSION_NAME }}-release-unsigned.apk
            app/build/outputs/apk/release/appdex-${{ steps.version.outputs.VERSION_NAME }}-release.apk
          draft: false
          prerelease: false
