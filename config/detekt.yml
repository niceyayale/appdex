config:
  validation: true

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 6
  ComplexCondition:
    threshold: 5
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    thresholdInClasses: 15

style:
  ReturnCount:
    max: 4
  WildcardImport:
    active: false  # Kotlin 测试代码常用 wildcard
