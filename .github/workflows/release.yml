name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '35'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$RELEASE_APK" ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          fi
          cp "$DEBUG_APK" "appdex-${{ steps.version.outputs.VERSION_NAME }}-debug.apk"
          cp "$RELEASE_APK" "appdex-${{ steps.version.outputs.VERSION_NAME }}-release.apk"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Extract the section between this version and the previous one
          CHANGELOG=$(awk "/## \[${VERSION}\]/{flag=1} /## \[v[0-9]/{if(flag && \$0 !~ /${VERSION}/) exit} flag" CHANGELOG.md)
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_NAME }}
          name: APPDEX ${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## APPDEX ${{ steps.version.outputs.VERSION_NAME }}

            ${{ steps.changelog.outputs.BODY }}

            ### Download

            - **Debug APK**: For testing, includes debug logging
            - **Release APK**: Production build (minified + shrunk, unsigned)

            ### Install

            1. Download the APK file below
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK file to install

            ---
            [Full Changelog](https://github.com/niceyayale/appdex/blob/main/CHANGELOG.md)
          files: |
            appdex-${{ steps.version.outputs.VERSION_NAME }}-debug.apk
            appdex-${{ steps.version.outputs.VERSION_NAME }}-release.apk
          draft: false
          prerelease: false
